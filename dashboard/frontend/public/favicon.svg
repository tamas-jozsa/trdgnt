<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.8"/>

  <!-- AI/Brain circuit pattern -->
  <g stroke="url(#glow)" stroke-width="2" fill="none" opacity="0.6">
    <circle cx="50" cy="50" r="28"/>
    <circle cx="50" cy="50" r="14"/>
    <line x1="50" y1="22" x2="50" y2="36"/>
    <line x1="50" y1="64" x2="50" y2="78"/>
    <line x1="22" y1="50" x2="36" y2="50"/>
    <line x1="64" y1="50" x2="78" y2="50"/>
    <line x1="30" y1="30" x2="40" y2="40"/>
    <line x1="60" y1="60" x2="70" y2="70"/>
    <line x1="70" y1="30" x2="60" y2="40"/>
    <line x1="40" y1="60" x2="30" y2="70"/>
  </g>

  <!-- Center dots (nodes) -->
  <circle cx="50" cy="50" r="5" fill="url(#glow)"/>
  <circle cx="50" cy="36" r="3" fill="#00d4ff"/>
  <circle cx="50" cy="64" r="3" fill="#00d4ff"/>
  <circle cx="36" cy="50" r="3" fill="#f472b6"/>
  <circle cx="64" cy="50" r="3" fill="#f472b6"/>

  <!-- Rising chart line -->
  <path d="M 18 65 L 35 55 L 50 62 L 65 42 L 82 32" fill="none" stroke="url(#chart)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- Arrow head -->
  <polygon points="82,32 75,36 75,30" fill="#34d399"/>
</svg>